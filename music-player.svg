<svg xmlns="http://www.w3.org/2000/svg" width="340" height="110">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="340" height="110" rx="15" fill="url(#grad)" filter="url(#shadow)"/>
  
  <!-- Glowing border -->
  <rect width="338" height="108" x="1" y="1" rx="14" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>

  <!-- Album Art Placeholder (Vinyl Record) -->
  <g transform="translate(15, 15)">
    <circle cx="40" cy="40" r="40" fill="#111" />
    <circle cx="40" cy="40" r="30" fill="#222" />
    <circle cx="40" cy="40" r="20" fill="#333" />
    <circle cx="40" cy="40" r="10" fill="#00ffff" />
    <circle cx="40" cy="40" r="3" fill="#111" />
  </g>

  <!-- Text -->
  <text x="110" y="45" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold">Come and Get Your Love</text>
  <text x="110" y="68" fill="#a1a1aa" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="14">Redbone</text>

  <!-- Audio Waves animation (Fake) -->
  <g transform="translate(110, 85)">
    <rect x="0" y="-5" width="3" height="10" fill="#00ffff" rx="1.5" />
    <rect x="6" y="-8" width="3" height="13" fill="#00ffff" rx="1.5" />
    <rect x="12" y="-3" width="3" height="8" fill="#00ffff" rx="1.5" />
    <rect x="18" y="-12" width="3" height="17" fill="#00ffff" rx="1.5" />
    <rect x="24" y="-6" width="3" height="11" fill="#00ffff" rx="1.5" />
    <rect x="30" y="-9" width="3" height="14" fill="#00ffff" rx="1.5" />
    <text x="42" y="3" fill="#00ffff" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" letter-spacing="1">PLAYING</text>
  </g>
</svg>
